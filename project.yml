name: PhotoBoothPro
options:
  bundleIdPrefix: com.photoboothpro
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""

targets:
  PhotoBoothPro:
    type: application
    platform: macOS
    sources:
      - path: Sources/PhotoBoothPro
    resources:
      - path: Sources/PhotoBoothPro/Assets.xcassets
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: PhotoBooth Pro
        CFBundleDisplayName: PhotoBooth Pro
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHighResolutionCapable: true
        NSCameraUsageDescription: "PhotoBooth Pro needs camera access to capture your photos."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    entitlements:
      path: Resources/PhotoBoothPro.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.camera: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.assets.pictures.read-write: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.photoboothpro.app
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
